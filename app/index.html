<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="mayur dayal">
    <link rel="stylesheet" href="index.css">
    <title>Quiz-Time</title>
</head>

<body>

    <body>
        <div id="contain">

            <!--Result section-->
            <div class="popupContainer">
                <div class="answers">
                    <div class="container marksBg">
                        <p>You scored: <span class="marks">0%</span> </p>
                        <button>Retry</button>
                    </div>
                </div>
            </div>

            <!--Question section-->
            <div class="question">
                <div class="container">
                    <h2 class="subtitle">How much do you know about Naruto Uzumaki.</h2>

                    <form class="quiz">
                        <div class="questions one">
                            <p>Who was Naruto's Academy teacher?</p>
                            <div class="check">
                                <input type="radio" name="q1" value="A" checked />
                                <label>Daikoku</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q1" value="B" />
                                <label>Iruka</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q1" value="C" />
                                <label>Minato</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q1" value="D" />
                                <label>Sasuke</label>
                            </div>
                        </div>

                        <div class="questions two">
                            <p>What is the leaf village called?</p>
                            <div class="check">
                                <input type="radio" name="q2" value="A" checked />
                                <label>Iwagakure</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q2" value="B" />
                                <label>Kirigakure</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q2" value="C" />
                                <label>Sunagakure</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q2" value="D" />
                                <label>Konohagakure</label>
                            </div>
                        </div>

                        <div class="questions three">
                            <p>What is the name of the 2nd Hokage?</p>
                            <div class="check">
                                <input type="radio" name="q3" value="A" checked />
                                <label>Tobirama Senju</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q3" value="B" />
                                <label>Hashirama Senju</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q3" value="C" />
                                <label>Hiruzen Sarutobi</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q3" value="D" />
                                <label>Kakashi Hatake</label>
                            </div>
                        </div>

                        <div class="questions four">
                            <p>Which famed clan was completely massacred?</p>
                            <div class="check">
                                <input type="radio" name="q4" value="A" checked />
                                <label>Uzumaki</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q4" value="B" />
                                <label>Nara</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q4" value="C" />
                                <label>Hyuuga</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q4" value="D" />
                                <label>Uchiha</label>
                            </div>
                        </div>

                        <div class="questions five">
                            <p>Which friend died during the Fourth Great War?</p>
                            <div class="check">
                                <input type="radio" name="q5" value="A" checked />
                                <label>Choji</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q5" value="B" />
                                <label>Hinata</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q5" value="C" />
                                <label>Neji</label>
                            </div>

                            <div class="check">
                                <input type="radio" name="q5" value="D" />
                                <label>Shikimaru</label>
                            </div>
                        </div>

                        <div class="send">
                            <input type="submit" value="Submit Answer">
                        </div>
                    </form>
                </div>
            </div>

        </div>
        <script src="index.js"></script>

    </body>

</html>
